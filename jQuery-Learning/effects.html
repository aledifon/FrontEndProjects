<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>jQuery Learning</title>           
        <script type="text/javascript" src="js/jquery-4.0.0.min.js"></script>
        <script type="text/javascript" src="js/04-effects.js"></script>                
        <style>
            #box{
                width: 300px;
                height: 50px;
                border: 5px dashed black;
                background: #ccc;
                text-align: center;
                line-height: 50px;
                color: black;
                font-size: 19px;
                font-family: Verdana;
                margin-top: 15px;
            }
        </style>
    </head>
    <body>
        <h1>Learning jQuery Course - Effects</h1>                     
        
        <button id="showButton">
            Show
        </button>
        <button id="hideButton">
            Hide
        </button>

        <button id="toggleButton">
            Open
        </button>

        <button id="animateButton">
            Animate me!
        </button>
        
        <div id="box">
            Show on javascript
        </div>
    </body>
</html>
