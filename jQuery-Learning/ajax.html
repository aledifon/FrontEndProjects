<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>jQuery Learning</title>           
        <script type="text/javascript" src="js/jquery-4.0.0.min.js"></script>
        <script type="text/javascript" src="js/05-ajax.js"></script>                        
        <style>
            #data{
                width: 250px;
                height: 250px;
                border: 2px solid green;
                background: beige;
                transition: 300ms all;
                overflow: scroll;
            }
        </style>
    </head>
    <body>
        <h1>Learning jQuery Course - AJAX</h1>                     
        
        <p>
            <form action="https://jsonplaceholder.typicode.com/posts" method="POST" id="form">
                Name: <input type="text" name="name"/>
                Web: <input type="text" name="web">
                <input type="submit" value="Register">
            </form>
        </p>
        <div id="data"></div>
    </body>
</html>
