        <script type="text/javascript" src="js/jquery-4.0.0.min.js"></script>

        <style>
            .zebra{

            .big{

            .upper-margin{
                display: block;

            .highlighted{
                border-bottom: 2px solid green;
            }

    <body>

        <ul>
            <li><a href="https://www.google.com" title="Google">Go to Google</a></li>
            <li><a href="https://www.facebook.com" title="Facebook">Go to Facebook</a></li>                        
        </ul>  
        <p id="red" class="zebra">jQuery exercices</p>
        <p id="yellow" class="no_border">practicing with Selectors</p>
        <p id="green" class="no_border">I want to be a green paragraph</p>
        <p class="zebra">I'm a white paragraph</p>

        <div id="box">
            <p>Hi I'm a box</p>
            <ul>
                <li>Element 1</li>
                <!-- <li class="highlighted">Element 2</li> -->
                <li id="element2">Element 2</li>
            </ul>
            <span class="highlighted">I'm a span</span>
        </div>
